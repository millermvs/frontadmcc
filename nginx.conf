server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compressão gzip (reduz tamanho dos assets em ~70%) ─────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;
    gzip_min_length 1024;

    # ── Cache longo para assets com hash no nome (gerado pelo Angular build) ───
    # O Angular gera nomes como main.abc123.js — safe para cache de 1 ano
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────────
    # Qualquer rota não encontrada (ex: /pages/equipes) redireciona para index.html
    # sem isso, F5 em qualquer rota retorna 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
